<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Arial',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:500px;
    color:white;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    z-index:10;
}

h1{
    font-size:2.5rem;
    animation:bounce 2s infinite;
}

p{
    margin-top:15px;
    font-size:1.2rem;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d6d;
    font-size:1rem;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* Cats */
.cat{
    position:absolute;
    font-size:40px;
    animation:floatCat linear infinite;
}

@keyframes floatCat{
    from{
        transform:translateY(110vh);
    }
    to{
        transform:translateY(-120px);
    }
}

/* Confetti */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

/* Mobile */
@media(max-width:600px){
    h1{
        font-size:2rem;
    }

    p{
        font-size:1rem;
    }

    .cat{
        font-size:30px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday Burnt Nuts! 🎉</h1>
    <p>
        Wishing you a day filled with happiness, laughter,
        cake, surprises, and lots of love! 🥳💖
    </p>

    <button onclick="birthdayMessage()">
        Click for Surprise 🎁
    </button>
</div>

<script>
// Surprise Button
function birthdayMessage(){
    alert("🐱🎉  YAY!!!!! Wishing you endless happiness, lots of cake, amazing memories, and all the love in the world!I am glad that you replied to the brainrotted story,i will never forget how we met muehehehe!.ILY BUMBUM! 🎂✨");
}

// Create Confetti
for(let i=0;i<150;i++){
    let confetti=document.createElement("div");
    confetti.classList.add("confetti");

    confetti.style.left=Math.random()*100+"vw";

    confetti.style.background=
    `hsl(${Math.random()*360},100%,50%)`;

    confetti.style.animationDuration=
    (3+Math.random()*4)+"s";

    confetti.style.opacity=Math.random();

    document.body.appendChild(confetti);
}

// Floating Cats
const cats=["🐱","😺","😸","🐈"];

for(let i=0;i<15;i++){
    let cat=document.createElement("div");
    cat.classList.add("cat");

    cat.innerHTML=
    cats[Math.floor(Math.random()*cats.length)];

    cat.style.left=Math.random()*100+"vw";
    cat.style.animationDuration=
    (8+Math.random()*10)+"s";
    cat.style.animationDelay=
    Math.random()*5+"s";

    document.body.appendChild(cat);
}
</script>

</body>
</html>
